name: MT5 Compile

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**/*.mq5'
      - '**/*.mqh'
      - 'MQL5_CI/**'
      - '.github/workflows/mt5-compile.yml'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Compile mode'
        required: true
        default: 'Changed'
        type: choice
        options:
          - Changed
          - All
      base_ref:
        description: 'Base ref for Changed mode'
        required: false
        default: 'HEAD~1'

jobs:
  compile:
    runs-on: [self-hosted, windows, mt5]

    steps:
      - name: Manual checkout
        shell: pwsh
        run: |
          $repoUrl = "https://github.com/${{ github.repository }}.git"
          $branch = "${{ github.ref_name }}"
          $workDir = Join-Path $env:RUNNER_WORKSPACE "repo"

          if (-not (Test-Path $workDir)) {
            git clone $repoUrl $workDir
            if ($LASTEXITCODE -ne 0) { throw "git clone failed" }
          }

          Set-Location $workDir
          git remote set-url origin $repoUrl
          git fetch --all --prune
          git checkout $branch
          git reset --hard ${{ github.sha }}
          git clean -fd
          git log --oneline -n 5

      - name: Show git info
        shell: pwsh
        run: |
          git status
          git log --oneline -n 5

      - name: Set compile parameters
        id: params
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "mode=${{ inputs.mode }}" >> $env:GITHUB_OUTPUT
            "base_ref=${{ inputs.base_ref }}" >> $env:GITHUB_OUTPUT
          }
          else {
            "mode=Changed" >> $env:GITHUB_OUTPUT
            "base_ref=HEAD~1" >> $env:GITHUB_OUTPUT
          }

      - name: Run compile script
        shell: pwsh
        run: |
          $workDir = Join-Path $env:RUNNER_WORKSPACE "repo"
          Set-Location $workDir

          pwsh -File .\MQL5_CI\compile.ps1 `
          -Mode "${{ steps.params.outputs.mode }}" `
          -BaseRef "${{ steps.params.outputs.base_ref }}"

      - name: Debug generated files
        if: always()
        shell: pwsh
        run: |
          $workDir = Join-Path $env:RUNNER_WORKSPACE "repo"
          Write-Host "Runner workspace: $env:RUNNER_WORKSPACE"
          Write-Host "Repo dir: $workDir"

          Write-Host "=== Check compile log ==="
          Get-ChildItem -Path (Join-Path $workDir "MQL5_CI") -Force -ErrorAction SilentlyContinue

          Write-Host "=== Search ex5 files ==="
          Get-ChildItem -Path $workDir -Recurse -Filter *.ex5 -ErrorAction SilentlyContinue | Select-Object FullName
          
      - name: Upload compile log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-log
          path: ${{ runner.workspace }}/repo/MQL5_CI/compile_all.log
          if-no-files-found: warn

      - name: Upload compiled ex5 files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ex5
          path: ${{ runner.workspace }}/repo/**/*.ex5
          if-no-files-found: warn